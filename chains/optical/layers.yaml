# 分层价值链（Layered Value Chain）- 核心数据文件
#
# 这是整个浏览器的主驱动文件。
# 每个产业自定义自己的 Layer，系统不固定层数。
#
# 光模块产业分 4 层：
#   Application  应用层  - 下游应用
#   System       系统层  - 模块/系统
#   Component    器件层  - 核心器件
#   Material     材料层  - 基础材料
#
# items 支持两种写法：
#   1. 字符串：- DSP
#   2. dict：  - name: DSP
#                summary: 数字信号处理芯片
#                tags: [芯片, 上游]

industry: 光模块

layers:
  # ============================================================
  # 应用层（Application）- 下游
  # ============================================================
  - id: application
    title: 应用层
    items:
      - name: AI服务器
        summary: AI训练/推理服务器，光模块下游应用
        tags: [AI, 算力, GPU]
      - name: 数据中心
        summary: 光模块部署场景
        tags: [数据中心, 算力]
      - name: 交换机
        summary: 高速交换机，光模块下游应用
        tags: [通信, 数据中心, 网络]

  # ============================================================
  # 系统层（System）- 模块
  # ============================================================
  - id: system
    title: 系统层
    items:
      - name: 800G光模块
        summary: 800G高速光模块，AI算力主流规格
        tags: [光模块, 800G, AI]
      - name: 1.6T光模块
        summary: 1.6T下一代高速光模块，下一代AI算力核心规格
        tags: [光模块, 1.6T, 下一代]
      - name: CPO
        summary: 共封装光学技术，光电共封装下一代方向
        tags: [CPO, 硅光, 技术]

  # ============================================================
  # 器件层（Component）- 核心器件
  # ============================================================
  - id: component
    title: 器件层
    items:
      - name: DSP
        summary: 光模块核心芯片，负责数字信号处理
        tags: [芯片, 光模块, 上游]
      - name: EML激光器
        summary: 电吸收调制激光器，高速光模块核心光源
        tags: [光器件, 激光器, 上游]
      - name: VCSEL
        summary: 垂直腔面发射激光器，短距光模块光源
        tags: [光器件, 激光器]
      - name: 硅光芯片
        summary: 硅基光电子集成技术，下一代光模块方向
        tags: [硅光, 芯片, 技术]

  # ============================================================
  # 材料层（Material）- 基础材料
  # ============================================================
  - id: material
    title: 材料层
    items:
      - name: 硅片
        summary: 硅基材料，芯片制造基础
        tags: [材料, 硅]
      - name: PCB
        summary: 印刷电路板，光模块基板材料
        tags: [材料, PCB, 上游]
      - name: 石英
        summary: 石英材料，光器件基础材料
        tags: [材料, 石英]
