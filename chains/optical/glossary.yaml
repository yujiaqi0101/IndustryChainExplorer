# 名词解释（Glossary）
# 负责解释产业包中的专业名词。
# 详情页会自动匹配条目名，展示释义。

terms:
  DSP: 数字信号处理芯片，光模块核心芯片，负责电信号的数字处理。
  EML: 电吸收调制激光器，高速光模块核心光源，用于长距高速传输。
  VCSEL: 垂直腔面发射激光器，短距光模块光源，多用于多模光纤。
  CPO: 共封装光学（Co-Packaged Optics），光电共封装下一代技术方向。
  PCB: 印刷电路板，光模块基板材料。
  800G: 800Gbps 速率光模块，AI算力主流规格。
  1.6T: 1.6Tbps 速率光模块，下一代AI算力核心规格。
  硅光: 硅基光电子集成技术，利用硅工艺实现光电子集成。
  EML激光器: 电吸收调制激光器，高速光模块核心光源。
  硅光芯片: 硅基光电子集成芯片，下一代光模块方向。
