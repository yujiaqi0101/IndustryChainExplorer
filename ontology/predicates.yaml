predicates:
  is_a:
    name: 属于
    subject: [concept, organization, document]
    object: [concept]
    inverse: has_instance
  part_of:
    name: 是...的一部分
    subject: [concept]
    object: [concept]
    inverse: contains
  produce:
    name: 生产
    subject: [organization]
    object: [concept]
    inverse: produced_by
  supply:
    name: 供应
    subject: [concept, organization]
    object: [concept, organization]
    inverse: supplied_by
  use:
    name: 使用
    subject: [organization, concept]
    object: [concept]
    inverse: used_by
  apply_to:
    name: 应用于
    subject: [concept]
    object: [concept]
    inverse: applies
  replace:
    name: 替代
    subject: [concept]
    object: [concept]
    inverse: replaced_by
  compete_with:
    name: 与...竞争
    subject: [concept, organization]
    object: [concept, organization]
    symmetric: true
  depends_on:
    name: 依赖
    subject: [organization, concept]
    object: [concept, organization]
  defined_by:
    name: 由...定义
    subject: [concept]
    object: [document]
  published_by:
    name: 由...发布
    subject: [document]
    object: [organization]
  research_on:
    name: 研究
    subject: [organization]
    object: [concept]
  related_to:
    name: 相关
    subject: [concept, organization]
    object: [concept, organization]
    symmetric: true
  integrate:
    name: 集成
    subject: [concept]
    object: [concept]
    inverse: integrated_in
